name: Deploy to Cloudflare Workers
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          token: ${{ secrets.AMDOTCOM_CLOUDFLARE_WORKERS }}
          persist-credentials: true

      - name: Update submodules to latest remote
        env:
          GIT_TOKEN: ${{ secrets.AMDOTCOM_CLOUDFLARE_WORKERS }}
        run: |
          git config --global url."https://${GIT_TOKEN}@github.com/".insteadOf "https://github.com/"
          git submodule sync --recursive
          git submodule update --remote --merge --recursive

      - name: Debug
        run: |
          echo "DOING AN LS"
          ls aaronmoreycom_content/content/files
          echo "THAT WAS THE LS"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Astro site
        run: npm run build

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKERS_TOKEN }}
