name: Deploy to Cloudflare Workers
on:
  push:
    branches: [feature/astro-6.0-upgrade]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.AARONMOREYCOM_CONTENT_PAT }}
      
      - name: Checkout submodules
        run: |
          git submodule init
          git config submodule.aaronmoreycom_content.url "https://x-access-token:${{ secrets.AARONMOREYCOM_CONTENT_PAT }}@github.com/aaronmfmorey/aaronmoreycom_content.git"
          git submodule update --recursive
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build
      
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
